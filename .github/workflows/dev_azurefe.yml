# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - webfrontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build
        env:
          VITE_API_BASE_URL: https://azurebe-hdfcasbca9bdb9ac.canadacentral-01.azurewebsites.net/api

      - name: Prepare deployment package
        run: |
          mkdir deploy-pkg
          cp -r dist deploy-pkg/dist
          cp package.json deploy-pkg/package.json
          cp package-lock.json deploy-pkg/package-lock.json
          cp serve.js deploy-pkg/serve.js

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-pkg

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7CC767DD22FE4C6F8391C180BD277FD5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_996B379FF48B461B8C73C768624E7E34 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F27CA0165EF74AFD967E3D4C7BBABCAD }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webfrontend'
          slot-name: 'Production'
          package: .
